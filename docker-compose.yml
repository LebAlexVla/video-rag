version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: video-lecture-rag-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:6333/ | grep -q Qdrant || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  qdrant_storage: